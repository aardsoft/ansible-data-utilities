name: shared container builder

on:
  workflow_call:
    inputs:
      image-directory:
        required: false
        type: string
        default: 'container-image'
      extra-repositories: # Repos to pass through to kiwi
        required: false
        type: string
        default: ''

jobs:
  build-images:
    runs-on: opensuse-leap-imgbuild
    steps:
      - name: Checkout Calling Repository
        uses: actions/checkout@v4

      - name: Run Build Logic
        uses: aardsoft/ansible-data-utilities/.github/actions/container-build@master
        with:
          image-directory: ${{ inputs.image-directory }}
          extra-repositories: ${{ inputs.extra-repositories }}
